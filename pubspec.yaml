name: quan_ly_chi_tieu
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_auth_web: ^6.1.1
  cloud_firestore_web: ^5.1.1

  # Google Sign-In
  google_sign_in: ^6.2.0

  # State management
  provider: ^6.1.5

  # Date & currency format
  intl: ^0.20.2

  # Charts
  fl_chart: ^1.1.1

  # Icons iOS style
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  # Thư viện tạo icon (đã có)
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/google_logo.png
    - assets/icon.png
    # - assets/icon.png  <-- Nếu bạn muốn dùng ảnh này trong app thì bỏ comment dòng này, còn làm icon thì không bắt buộc khai báo ở đây

# --- PHẦN CẤU HÌNH ICON (MỚI THÊM) ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png" # Đảm bảo bạn đã có file ảnh tên là icon.png trong thư mục assets
  min_sdk_android: 21